<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO-GO Shuttles | Loading...</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/gogologo.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #e8ebed, #f9f5f5);
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        #loader-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.88;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(4, 34, 62, 0.65),
               
            );
            z-index: 2;
        }

        .loader-content {
            position: relative;
            z-index: 3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.5));
            animation: logoFade 2s ease forwards;
        }

        @keyframes logoFade {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #e31837;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .tagline {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 3px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        /* Elegant Corporate Progress */
        .progress-container {
            width: 380px;
            max-width: 85%;
        }

        .progress-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #e31837, #ff4d6b);
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(227, 24, 55, 0.6);
            animation: progressAnim 2.8s ease-in-out forwards;
        }

        @keyframes progressAnim {
            to { width: 100%; }
        }

        .loading-text {
            margin-top: 18px;
            font-size: 15px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.85;
            color:#0c0c0c;
        }
    </style>
</head>
<body>

    <!-- Fullscreen Video Background -->
    <video id="loader-video" autoplay muted playsinline>
        <source src="gogoloader.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="loader-content">
        <img src="/logisko/assets/img/gogo-logo.png" alt="GO-GO Shuttles" class="logo">
        
        <div class="brand-name">GO-GO SHUTTLES</div>
        <!--<div class="tagline">PREMIUM STAFF &amp; CORPORATE TRANSPORT</div>-->

        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="loading-text">Preparing Your Journey • Excellence in Motion</div>
    </div>

    <script>
        const video = document.getElementById('loader-video');

        // Auto redirect after maximum 3 seconds
        setTimeout(() => {
            window.location.href = '/logisko/index.html';
        }, 3000);

        // Redirect when video ends (if shorter than 3s)
        video.addEventListener('ended', () => {
            window.location.href = '/logisko/index.html';
        });

        // Force play in case of autoplay restrictions
        video.play().catch(() => {
            setTimeout(() => {
                window.location.href = '/logisko/index.html';
            }, 1200);
        });
    </script>

</body>
</html>
