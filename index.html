<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO-GO Shuttles | Loading...</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/gogologo.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #04223e;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .loader-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #loader-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(4,34,62,0.6), rgba(4,34,62,0.85));
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
        }

        .logo {
            width: 160px;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
        }

        .loading-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #e31837;
        }

        /* Road + Minibus Progress */
        .road {
            position: relative;
            width: 420px;
            height: 90px;
            background: linear-gradient(#222, #333);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 3;
        }

        .road::before {
            content: '';
            position: absolute;
            top: 50%;
            width: 100%;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #e31837,
                #e31837 30px,
                transparent 30px,
                transparent 60px
            );
            animation: roadMove 1.8s linear infinite;
        }

        @keyframes roadMove {
            from { background-position: 0 0; }
            to { background-position: -120px 0; }
        }

        .minibus {
            position: absolute;
            bottom: 18px;
            left: -80px;
            font-size: 52px;
            transition: left 2.8s linear;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            z-index: 4;
        }

        .content.loaded .minibus {
            left: calc(100% + 20px);
        }

        .minibus-wheel {
            position: absolute;
            bottom: -8px;
            font-size: 18px;
            animation: wheelSpin 0.4s linear infinite;
        }

        @keyframes wheelSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <video id="loader-video" autoplay muted playsinline>
            <source src="gogoloader.mp4" type="video/mp4">
        </video>
        
        <div class="overlay"></div>

        <div class="content" id="content">
            <img src="/logisko/assets/img/gogo-logo.png" alt="GO-GO Shuttles" class="logo">
            <div class="loading-text">Getting Your Ride Ready...</div>
            
            <!-- Road with Moving Minibus -->
            <div class="road">
                <div class="minibus" id="minibus">🚌</div>
            </div>
            
            <p style="margin-top: 25px; font-size: 14px; opacity: 0.8;">
                Premium Staff & Shuttle Transport
            </p>
        </div>
    </div>

    <script>
        const minibus = document.getElementById('minibus');
        const content = document.getElementById('content');
        const video = document.getElementById('loader-video');

        // Start the minibus animation after a tiny delay
        setTimeout(() => {
            content.classList.add('loaded');
        }, 180);

        // Redirect after maximum 3 seconds
        setTimeout(() => {
            window.location.href = '/logisko/index.html';
        }, 3000);

        // Also redirect when video ends (if it's shorter)
        video.addEventListener('ended', () => {
            window.location.href = '/logisko/index.html';
        });

        // Safety fallback
        video.play().catch(() => {
            setTimeout(() => {
                window.location.href = '/logisko/index.html';
            }, 1500);
        });
    </script>

</body>
</html>
